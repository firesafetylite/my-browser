<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: #ddd;
      border-bottom: 1px solid #aaa;
      flex-shrink: 0;
    }

    #toolbar button {
      font-family: monospace;
      font-size: 13px;
      padding: 3px 8px;
      background: #eee;
      border: 1px solid #999;
      cursor: pointer;
      border-radius: 2px;
    }
    #toolbar button:hover { background: #e0e0e0; }
    #toolbar button:active { background: #ccc; }

    #url-bar {
      flex: 1;
      font-family: monospace;
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid #999;
      border-radius: 2px;
      background: #fff;
      outline: none;
    }
    #url-bar:focus { border-color: #555; }

    #go-btn {
      font-family: monospace;
      font-size: 13px;
      padding: 4px 10px;
      background: #eee;
      border: 1px solid #999;
      cursor: pointer;
      border-radius: 2px;
    }
    #go-btn:hover { background: #e0e0e0; }

    #status-bar {
      font-family: monospace;
      font-size: 11px;
      padding: 2px 8px;
      background: #ddd;
      border-bottom: 1px solid #bbb;
      color: #444;
      height: 20px;
      flex-shrink: 0;
    }

    #frame-wrapper {
      flex: 1;
      background: #fff;
      position: relative;
    }

    #browser-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #home-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #f8f8f8;
    }

    #home-screen h1 {
      font-family: monospace;
      font-size: 18px;
      font-weight: normal;
      color: #333;
    }

    #home-search {
      display: flex;
      gap: 6px;
    }

    #home-input {
      font-family: monospace;
      font-size: 14px;
      padding: 6px 10px;
      border: 1px solid #999;
      border-radius: 2px;
      width: 320px;
      outline: none;
    }
    #home-input:focus { border-color: #555; }

    #home-go {
      font-family: monospace;
      font-size: 14px;
      padding: 6px 12px;
      background: #eee;
      border: 1px solid #999;
      cursor: pointer;
      border-radius: 2px;
    }
    #home-go:hover { background: #e0e0e0; }

    #error-msg {
      font-family: monospace;
      font-size: 12px;
      color: #c00;
      display: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button id="back-btn" title="Back">&#8592;</button>
  <button id="fwd-btn" title="Forward">&#8594;</button>
  <button id="reload-btn" title="Reload">&#8635;</button>
  <button id="home-btn" title="Home">&#8962;</button>
  <input id="url-bar" type="text" placeholder="Enter URL or search..." spellcheck="false" />
  <button id="go-btn">Go</button>
</div>

<div id="status-bar" id="status"></div>

<div id="frame-wrapper">
  <div id="home-screen">
    <h1>Browser</h1>
    <div id="home-search">
      <input id="home-input" type="text" placeholder="Enter URL or search..." spellcheck="false" autofocus />
      <button id="home-go">Go</button>
    </div>
    <span id="error-msg"></span>
  </div>
  <iframe id="browser-frame" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals" style="display:none;"></iframe>
</div>

<script src="uv.bundle.js"></script>
<script src="uv.config.js"></script>
<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => setStatus('Service worker ready.'))
      .catch(err => setStatus('SW error: ' + err.message));
  } else {
    setStatus('Service workers not supported.');
  }

  const frame      = document.getElementById('browser-frame');
  const homeScreen = document.getElementById('home-screen');
  const urlBar     = document.getElementById('url-bar');
  const statusBar  = document.querySelector('#status-bar');
  const errorMsg   = document.getElementById('error-msg');

  function setStatus(msg) {
    statusBar.textContent = msg;
  }

  function normalizeURL(input) {
    input = input.trim();
    if (!input) return null;
    // If it looks like a URL, ensure it has a protocol
    if (/^(https?:\/\/)/i.test(input)) return input;
    // If it has a dot and no spaces, treat as URL
    if (/^[^\s]+\.[^\s]+$/.test(input)) return 'https://' + input;
    // Otherwise, search via Google
    return 'https://www.google.com/search?q=' + encodeURIComponent(input);
  }

  function navigate(input) {
    errorMsg.style.display = 'none';
    const url = normalizeURL(input);
    if (!url) return;

    urlBar.value = url;

    // Check if Ultraviolet is available
    if (typeof __uv$config === 'undefined') {
      errorMsg.textContent = 'Ultraviolet not loaded. Make sure uv/uv.bundle.js and uv/uv.config.js are present.';
      errorMsg.style.display = 'block';
      setStatus('Error: UV not loaded.');
      return;
    }

    const proxied = __uv$config.prefix + __uv$config.encodeUrl(url);

    homeScreen.style.display = 'none';
    frame.style.display = 'block';
    frame.src = proxied;
    setStatus('Loading: ' + url);

    frame.onload = () => setStatus(url);
  }

  // Toolbar buttons
  document.getElementById('back-btn').onclick   = () => { try { frame.contentWindow.history.back(); } catch(e){} };
  document.getElementById('fwd-btn').onclick    = () => { try { frame.contentWindow.history.forward(); } catch(e){} };
  document.getElementById('reload-btn').onclick = () => { try { frame.contentWindow.location.reload(); } catch(e) { frame.src = frame.src; } };
  document.getElementById('home-btn').onclick   = () => {
    frame.style.display = 'none';
    frame.src = '';
    urlBar.value = '';
    homeScreen.style.display = 'flex';
    setStatus('');
  };

  document.getElementById('go-btn').onclick = () => navigate(urlBar.value);
  urlBar.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlBar.value); });

  document.getElementById('home-go').onclick = () => navigate(document.getElementById('home-input').value);
  document.getElementById('home-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') navigate(document.getElementById('home-input').value);
  });
</script>
</body>
</html>
